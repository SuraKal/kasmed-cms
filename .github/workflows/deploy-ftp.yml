name: Deploy to cPanel by FTP

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: kasmed-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and upload
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Validate Python entry points
        run: python -m py_compile backend/app.py backend/passenger_wsgi.py backend/wsgi.py passenger_wsgi.py backend/tests/production_smoke.py

      - name: Prepare Passenger restart marker
        run: |
          mkdir -p tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ" > tmp/restart.txt

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload to cPanel app folder
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail

          remote_dir="${FTP_SERVER_DIR:-/kasmed_app/}"
          case "$remote_dir" in
            */) ;;
            *) remote_dir="${remote_dir}/" ;;
          esac

          protocol="${FTP_PROTOCOL:-ftps}"
          port="${FTP_PORT:-21}"
          ssl_force="false"
          ssl_protect_data="false"

          if [ "$protocol" = "ftps" ]; then
            ssl_force="true"
            ssl_protect_data="true"
            protocol="ftp"
          fi

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$port" "$protocol://$FTP_SERVER" <<LFTP
          set ftp:ssl-force $ssl_force
          set ftp:ssl-protect-data $ssl_protect_data
          set ssl:verify-certificate no
          mkdir -p "$remote_dir"
          mirror --reverse --verbose --only-newer \
            --exclude-glob ".git*" \
            --exclude-glob ".github/**" \
            --exclude-glob "node_modules/**" \
            --exclude-glob "backend/.venv/**" \
            --exclude-glob "backend/uploads/**" \
            --exclude-glob "__pycache__/**" \
            --exclude-glob "**/__pycache__/**" \
            --exclude-glob "*.pyc" \
            --exclude-glob ".env" \
            --exclude-glob ".env.*" \
            --exclude-glob "*.log" \
            --exclude-glob "dist-ssr/**" \
            ./ "$remote_dir"
          bye
          LFTP
