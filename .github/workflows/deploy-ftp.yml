name: Deploy to cPanel by FTP

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: kasmed-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and upload
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Validate Python entry points
        run: python -m py_compile backend/app.py backend/passenger_wsgi.py backend/wsgi.py passenger_wsgi.py backend/tests/production_smoke.py

      - name: Prepare Passenger restart marker
        run: |
          mkdir -p tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ" > tmp/restart.txt

      - name: Upload to cPanel public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ secrets.FTP_PROTOCOL }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/backend/.venv/**
            **/backend/uploads/**
            **/__pycache__/**
            **/*.pyc
            **/.env
            **/.env.*
            !**/.env.production.example
            **/*.log
            **/dist-ssr/**
